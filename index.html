<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="Todo.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h2>To-Do List <img src="https://img.freepik.com/free-vector/colorful-todo-list-illustration_1308-173328.jpg?semt=ais_hybrid&w=740&q=80"></h2>
            <div class="row">
                <input type="text" id="text-box" placeholder="Add your  text">
                <button>Add</button>
                <button id="clear-btn">Clear</button>
            </div>
            <ul id="list-container">

            </ul>
        </div>
    </div>
</body>
<script src="Todo.js"></script>
</html>
